[package]
name = "rxfetch"
version = "0.1.0"
edition = "2021"

[profile.dev]
debug ="full"

[profile.release]
lto = true
strip = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
atoi = "2.0.0"
pci-ids = "0.2.5"
pciutils-sys = "0.1.3"
sysinfo = { version = "0.29.2", default-features = false }

[dev-dependencies]
criterion = "0.5.1"

[[bench]]
name = "gpu"
harness = false

[[bench]]
name = "pci"
harness = false
